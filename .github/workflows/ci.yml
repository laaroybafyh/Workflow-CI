name: Model Re-training CI Workflow

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy pandas scikit-learn mlflow==2.19.0 matplotlib seaborn

    - name: Run MLflow Project
      run: |
        mlflow run MLProject --no-conda

    - name: Upload MLflow Runs Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-model-runs
        path: mlruns/
